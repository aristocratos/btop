name: Continuous Build FreeBSD

permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags-ignore:
      - '*.*'
    paths:
      - 'src/**'
      - '!src/linux/**'
      - '!src/osx/**'
      - '!src/netbsd/**'
      - '!src/openbsd/**'
      - 'include/**'
      - 'Makefile'
      - '.github/workflows/continuous-build-freebsd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '!src/linux/**'
      - '!src/osx/**'
      - '!src/netbsd/**'
      - '!src/openbsd/**'
      - 'include/**'
      - 'Makefile'
      - '.github/workflows/continuous-build-freebsd.yml'

jobs:
  build-freebsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ matrix.compiler }}
      cancel-in-progress: true
    strategy:
      matrix:
        compiler: ["clang++", "g++"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compile
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6 # v1.4.5
        with:
          release: '15.0'
          usesh: true
          prepare: |
            pkg install -y gmake gcc15 coreutils git lowdown
            git config --global --add safe.directory /home/runner/work/btop/btop
          run: |
            if [ "${{ matrix.compiler }}" == "g++" ]; then
              CXX=g++15
              COMPILER=gcc
            else
              CXX=clang++
              COMPILER=llvm
            fi
            gmake STATIC=true STRIP=true
            GIT_HASH=$(git rev-parse --short "$GITHUB_SHA")
            mv bin/btop bin/btop-"$COMPILER"-"$GIT_HASH"
            ls -alh bin

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: btop-x86_64-freebsd-15-${{ matrix.compiler }}
          path: 'bin/*'
          if-no-files-found: error
